name: Bug report
description: Something is broken
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before submitting, please search existing issues to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: Busytok version
      description: From Settings → About, or `busytok --version`
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "14.5"
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - Apple Silicon (arm64)
        - Intel (x86_64)
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: agents
    attributes:
      label: Agent(s) whose logs you were auditing
      options:
        - label: Claude Code
        - label: Codex
        - label: Gemini CLI

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. Include the log path if relevant.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant log output or drop a screenshot. **Do not paste prompt content from your AI agent logs — that's your data, not bug evidence.**
