# All ignored advisories are transitive dependencies of Tauri (the GUI
# framework) that we cannot upgrade without forking Tauri itself. They do
# not affect Busytok's own code or its attack surface:
#
#   - quick-xml is used by plist (Tauri) to read macOS .plist files at build
#     time — not for parsing untrusted user input.
#   - unic-* is used by urlpattern (tauri-utils) for URL routing patterns.
#   - gtk-rs / atk / gdk are GTK3 Linux GUI bindings pulled in by Tauri.
#   - proc-macro-error is a transitive build-dep of Tauri's proc macros.
#
# These ignores should be revisited when Tauri is upgraded to a version that
# updates or replaces the affected transitive crates.

[advisories]
ignore = [
    # quick-xml vulnerabilities (transitive via plist → tauri)
    "RUSTSEC-2026-0194",  # quick-xml: quadratic run time for duplicate attribute names
    "RUSTSEC-2026-0195",  # quick-xml: unbounded namespace-declaration allocation DoS

    # unic-* unmaintained (transitive via urlpattern → tauri-utils → tauri)
    "RUSTSEC-2025-0075",  # unic-char-range unmaintained
    "RUSTSEC-2025-0080",  # unic-common unmaintained
    "RUSTSEC-2025-0081",  # unic-char-property unmaintained
    "RUSTSEC-2025-0098",  # unic-ucd-version unmaintained
    "RUSTSEC-2025-0100",  # unic-ucd-ident unmaintained

    # gtk-rs GTK3 bindings unmaintained (transitive via tauri, Linux only)
    "RUSTSEC-2024-0411",  # gdkwayland-sys
    "RUSTSEC-2024-0412",  # gdk
    "RUSTSEC-2024-0413",  # atk
    "RUSTSEC-2024-0414",  # gdkx11-sys
    "RUSTSEC-2024-0415",  # gtk
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0417",  # gdkx11
    "RUSTSEC-2024-0418",  # gdk-sys
    "RUSTSEC-2024-0419",  # gtk3-macros
    "RUSTSEC-2024-0420",  # gtk-sys

    # proc-macro-error unmaintained (transitive build-dep via tauri macros)
    "RUSTSEC-2024-0370",  # proc-macro-error

    # anyhow unsoundness (direct dep — does not affect Busytok's usage pattern:
    # we never downcast_mut across trust boundaries)
    "RUSTSEC-2026-0190",  # anyhow: unsoundness in Error::downcast_mut()

    # glib unsoundness (transitive via gtk-rs → tauri, Linux only)
    "RUSTSEC-2024-0429",  # glib: unsound Iterator impls for VariantStrIter
]
