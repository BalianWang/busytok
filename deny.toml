# cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# No all-features = true; respect crate-level defaults.

[advisories]
# Fail on advisories. Use `cargo deny check advisories --ignore <id>` to
# suppress with a documented reason.
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
ignore = []

[licenses]
# Allow licenses compatible with MIT (the project's license).
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
]
confidence-threshold = 0.93
exceptions = []

[bans]
# No hard bans for now. Lint duplicate versions only.
multiple-versions = "warn"
wildcards = "deny"
deny = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
