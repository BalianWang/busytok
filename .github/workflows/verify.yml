name: verify

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy (non-macOS — GUI crate is macOS-only)
        if: matrix.os != 'macos-latest'
        run: cargo clippy --workspace --exclude busytok-gui --all-targets -- -D warnings

      - name: cargo clippy (macOS — includes GUI)
        if: matrix.os == 'macos-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build sidecars for macOS (required by tauri build.rs externalBin)
        if: matrix.os == 'macos-latest'
        run: |
          cargo build -p busytok-service -p busytok
          mkdir -p apps/gui/src-tauri/binaries
          cp target/debug/busytok-service apps/gui/src-tauri/binaries/busytok-service-aarch64-apple-darwin
          cp target/debug/busytok apps/gui/src-tauri/binaries/busytok-aarch64-apple-darwin

      - name: cargo test (non-macOS — GUI crate is macOS-only)
        if: matrix.os != 'macos-latest'
        run: cargo test --workspace --exclude busytok-gui

      - name: cargo test (macOS — includes GUI)
        if: matrix.os == 'macos-latest'
        run: cargo test --workspace

      # Catch packaging regressions (broken scripts, missing deps) at PR
      # time instead of at release time. Runs in <2s — no build involved.
      - name: Packaging script smoke check (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          set -euo pipefail
          # 1. Bash syntax check on all packaging scripts
          for script in packaging/macos/scripts/*.sh; do
            bash -n "$script"
          done
          # 2. Verify critical packaging dependencies exist
          test -f packaging/macos/assets/dmg-background.png
          test -f packaging/macos/launchd/com.busytok.service.plist.template
          test -f packaging/macos/entitlements/app.plist
          test -f packaging/macos/entitlements/service.plist
          test -f packaging/macos/entitlements/sidecar-node.plist
          test -f crates/busytok-subagent/src/sidecar/protocol.rs
          test -f scripts/generate_updater_manifest.sh
          test -f scripts/generate_versions_manifest.sh
          # 3. Verify _release_vars.sh sources cleanly and defines required vars
          source packaging/macos/scripts/_release_vars.sh
          test -n "$BUNDLE_ROOT"
          test -n "$SIDECAR_NODE_VERSION"
          # 4. Artifact-level AppleDouble regression check: construct a
          # minimal .app tree with xattrs (simulating codesign), pack it
          # with the same flags as release.yml, and assert the archive
          # contains zero `._*` entries. This catches not only missing
          # flags but also refactored commands, env not reaching the tar
          # process, and bsdtar behavior changes.
          AD_TEST_DIR="$(mktemp -d)"
          mkdir -p "$AD_TEST_DIR/FakeApp.app/Contents/MacOS"
          printf '#!/bin/bash\necho hi\n' > "$AD_TEST_DIR/FakeApp.app/Contents/MacOS/FakeApp"
          chmod +x "$AD_TEST_DIR/FakeApp.app/Contents/MacOS/FakeApp"
          # Simulate codesign xattrs (the trigger for AppleDouble emission).
          xattr -w com.apple.cs.CodeDirectory "fake-sig" \
            "$AD_TEST_DIR/FakeApp.app/Contents/MacOS/FakeApp"
          # Sanity: confirm the xattr is set.
          test -n "$(xattr "$AD_TEST_DIR/FakeApp.app/Contents/MacOS/FakeApp")"
          # Pack with the release flags.
          export COPYFILE_DISABLE=1
          ( cd "$AD_TEST_DIR" && tar --no-mac-metadata -czf fake.tar.gz FakeApp.app )
          # Assert no AppleDouble `._*` entries in the archive.
          # Use Python's tarfile (not `tar -tzf | grep`) because BSD tar's
          # -t flag filters AppleDouble ._ entries from its listing, giving
          # a false negative. Python lists all members including ._ entries.
          python3 -c '
          import sys, tarfile
          with tarfile.open(sys.argv[1]) as t:
              bad = [m.name for m in t.getmembers() if "/._" in m.name or m.name.startswith("._")]
              if bad:
                  print("ERROR: archive contains AppleDouble ._ files:")
                  for b in bad[:10]:
                      print(f"  {b}")
                  sys.exit(1)
          ' "$AD_TEST_DIR/fake.tar.gz"
          # Negative control: without the flags, BSD tar MUST emit ._ files.
          # This proves the test actually catches the regression.
          unset COPYFILE_DISABLE
          ( cd "$AD_TEST_DIR" && tar -czf fake_noflags.tar.gz FakeApp.app )
          python3 -c '
          import sys, tarfile
          with tarfile.open(sys.argv[1]) as t:
              bad = [m.name for m in t.getmembers() if "/._" in m.name or m.name.startswith("._")]
              if not bad:
                  print("WARNING: negative control has no ._ files — test may not catch regression")
              else:
                  print(f"Negative control confirmed: {len(bad)} ._ files present without flags")
          ' "$AD_TEST_DIR/fake_noflags.tar.gz"
          rm -rf "$AD_TEST_DIR"
          echo "Packaging script smoke check passed."

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        if: matrix.os == 'ubuntu-latest'
        run: cargo audit

      # cargo-deny check deferred: needs per-crate license tuning.
      # cargo-audit already catches security advisories.

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Coverage gate on the audit-critical crates (GUI excluded). The gate is a
      # regression floor (default 80); bump COVERAGE_GATE toward 85 as legacy
      # modules gain tests. See scripts/coverage.sh.
      - name: Coverage gate
        if: matrix.os == 'ubuntu-latest'
        env:
          COVERAGE_GATE: ${{ vars.COVERAGE_GATE || '80' }}
        run: bash scripts/coverage.sh

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm typecheck
        run: pnpm typecheck

      # pnpm test / coverage / release-smoke deferred: vitest hangs on CI
      # runners (Node 22/24 + tinypool — same pattern as local Node 25).
      # pnpm typecheck passes. Re-enable after vitest pool config is tuned.
      # - name: pnpm test
      #   run: pnpm -r test
      # - name: pnpm coverage
      #   if: matrix.os == 'ubuntu-latest'
      #   run: pnpm -r test:coverage
      # - name: release workflow smoke
      #   if: matrix.os == 'ubuntu-latest'
      #   run: bash tests/workflows/release_workflow_test.sh
