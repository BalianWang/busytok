name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to upload to GitHub Releases

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-publish

jobs:
  publish-macos:
    environment: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: "0"   # full history + all tags — the versions.json step enumerates `git tag`

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilation targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Write Apple API key (.p8) for notarytool
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: printf '%s' "$APPLE_API_KEY" > /tmp/apple-api-key.p8

      - name: Import Apple Developer ID certificate into CI keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # Disable auto-lock: a freshly created keychain locks itself after
          # a short period of inactivity. The cargo build (~2min) between this
          # step and the codesign step is long enough for the keychain to
          # auto-lock, after which codesign blocks indefinitely waiting for a
          # GUI unlock prompt that never comes in headless CI. -lut 21600 sets
          # a 6h lock timeout, covering the whole workflow run.
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm /tmp/cert.p12

      - name: Verify signing identity is accessible (diagnostic)
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "=== keychains ==="
          security list-keychains
          echo "=== codesigning identities ==="
          security find-identity -v -p codesigning
          echo "=== will sign with: $DEVELOPER_ID_APPLICATION ==="

      - name: Build universal sidecars via lipo
        run: |
          cargo build --release --target aarch64-apple-darwin -p busytok-service -p busytok
          cargo build --release --target x86_64-apple-darwin -p busytok-service -p busytok
          # Populate binaries/ for Tauri’s externalBin build-time check.
          # package_dmg.sh calls tauri build which requires these files to
          # exist (tauri.conf.json externalBin). The real working binaries that
          # ship in the .app come from _bundle_helpers.sh (via the lipo outputs
          # below), but Tauri's build-step validation must pass first.
          mkdir -p apps/gui/src-tauri/binaries
          for triple in aarch64-apple-darwin x86_64-apple-darwin; do
            cp "target/$triple/release/busytok-service" "apps/gui/src-tauri/binaries/busytok-service-$triple"
            cp "target/$triple/release/busytok"         "apps/gui/src-tauri/binaries/busytok-$triple"
          done
          # Tauri's BUNDLE phase (after build) copies externalBin into the
          # .app. For --target universal-apple-darwin, it looks for files
          # suffixed with `universal-apple-darwin`. Use the aarch64 binary as
          # the source (content is irrelevant — _bundle_helpers.sh overwrites
          # with the correct universal builds right after Tauri places them).
          cp "apps/gui/src-tauri/binaries/busytok-service-aarch64-apple-darwin" \
             "apps/gui/src-tauri/binaries/busytok-service-universal-apple-darwin"
          cp "apps/gui/src-tauri/binaries/busytok-aarch64-apple-darwin" \
             "apps/gui/src-tauri/binaries/busytok-universal-apple-darwin"
          lipo -create -output target/release/busytok-service \
            target/aarch64-apple-darwin/release/busytok-service \
            target/x86_64-apple-darwin/release/busytok-service
          lipo -create -output target/release/busytok \
            target/aarch64-apple-darwin/release/busytok \
            target/x86_64-apple-darwin/release/busytok

      - name: Install create-dmg (DMG authoring tool)
        run: brew install create-dmg

      - name: Run repo-owned packaging pipeline (bundle .app + DMG + helper injection + two-tier signing)
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./packaging/macos/scripts/package_dmg.sh

      - name: Notarize DMG via App Store Connect API key + staple
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set +e
          APP_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' apps/gui/src-tauri/Cargo.toml | head -1)
          DMG="target/universal-apple-darwin/release/bundle/dmg/Busytok_${APP_VERSION}.dmg"
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG" \
            --key /tmp/apple-api-key.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait 2>&1)
          SUBMIT_EXIT=$?
          echo "$SUBMIT_OUTPUT"
          if [ $SUBMIT_EXIT -ne 0 ] || echo "$SUBMIT_OUTPUT" | grep -q 'status: Invalid'; then
            SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep -E '^\s*id:' | head -1 | awk '{print $2}')
            if [ -n "$SUBMISSION_ID" ]; then
              echo "=== Apple notarization log for $SUBMISSION_ID ==="
              xcrun notarytool log "$SUBMISSION_ID" \
                --key /tmp/apple-api-key.p8 \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER" || true
            fi
            echo "Notarization failed (see Apple log above)."
            exit 1
          fi
          set -e
          xcrun stapler staple "$DMG"

      - name: Generate updater payload (.tar.gz + .sig)
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR="target/universal-apple-darwin/release/bundle/macos"
          cd "$BUNDLE_DIR" && tar -czf Busytok.app.tar.gz Busytok.app && cd -
          # tauri signer auto-detects TAURI_PRIVATE_KEY + TAURI_PRIVATE_KEY_PASSWORD
          # from the environment — no CLI flags needed. This is the canonical CI
          # invocation; avoids the env:// / --private-key / --private-key-path /
          # --password conflicts from rc.9–11.
          npx @tauri-apps/cli signer sign "$BUNDLE_DIR/Busytok.app.tar.gz"

      - name: Generate latest.json via repo script
        run: |
          APP_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' apps/gui/src-tauri/Cargo.toml | head -1)
          BUNDLE_DIR="target/universal-apple-darwin/release/bundle/macos"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Busytok.app.tar.gz"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ./scripts/generate_updater_manifest.sh \
            "$APP_VERSION" \
            "$BUNDLE_DIR/Busytok.app.tar.gz.sig" \
            "$DOWNLOAD_URL" \
            "Busytok $APP_VERSION" \
            | sed "s|__PUB_DATE_PLACEHOLDER__|$PUB_DATE|" \
            > "$BUNDLE_DIR/latest.json"

      - name: Generate versions.json (version-history index)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          BUNDLE_DIR="target/universal-apple-darwin/release/bundle/macos"
          CURRENT_TAG="${{ github.ref_name }}"
          # Last 6 tags (newest first); current tag is included.
          # NOTE: use a while/read loop, NOT mapfile/readarray — GitHub's
          # macos-latest runs /bin/bash 3.2, which predates mapfile (bash 4+).
          ENTRIES="["
          FIRST=1
          while IFS= read -r TAG; do
            if [ "$TAG" = "$CURRENT_TAG" ]; then
              # Current release: read the locally-generated latest.json.
              MANIFEST="$BUNDLE_DIR/latest.json"
              BODY="$(jq -r '.notes // ""' "$MANIFEST")"
              DATE="$(jq -r '.pub_date // ""' "$MANIFEST")"
              VER="$CURRENT_TAG"
            else
              URL="https://github.com/$REPO/releases/download/$TAG/latest.json"
              JSON="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" "$URL" || true)"
              [ -z "$JSON" ] && continue
              BODY="$(printf '%s' "$JSON" | jq -r '.notes // ""')"
              DATE="$(printf '%s' "$JSON" | jq -r '.pub_date // ""')"
              VER="$TAG"
            fi
            ENTRY=$(jq -nc \
              --arg tag "$VER" \
              --arg date "$DATE" \
              --arg body "$BODY" \
              --arg url "https://github.com/$REPO/releases/download/$TAG/latest.json" \
              '{tag_name:$tag, published_at:$date, body:$body, manifest_url:$url}')
            [ "$FIRST" -eq 1 ] && FIRST=0 || ENTRIES+=","
            ENTRIES+="$ENTRY"
          done < <(git tag --sort=-creatordate | head -6)
          ENTRIES+="]"
          printf '%s' "$ENTRIES" | ./scripts/generate_versions_manifest.sh 5 > "$BUNDLE_DIR/versions.json"

      - name: Generate SHA256SUMS
        run: |
          cd target/universal-apple-darwin/release/bundle
          find . -type f \( -name '*.dmg' -o -name '*.tar.gz' -o -name '*.sig' -o -name 'latest.json' -o -name 'versions.json' \) \
            -exec shasum -a 256 {} \; >> "$RUNNER_TEMP/sha256sums.txt"

      - name: Create draft GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            target/universal-apple-darwin/release/bundle/macos/Busytok.app.tar.gz
            target/universal-apple-darwin/release/bundle/macos/Busytok.app.tar.gz.sig
            target/universal-apple-darwin/release/bundle/macos/latest.json
            target/universal-apple-darwin/release/bundle/macos/versions.json
            ${{ runner.temp }}/sha256sums.txt

      - name: Cleanup Apple API key (always)
        if: always()
        run: rm -f /tmp/apple-api-key.p8
